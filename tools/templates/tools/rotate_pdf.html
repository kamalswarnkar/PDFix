{% extends "tools/base.html" %}

{% block title %}Rotate PDF - PDFix{% endblock %}

{% block content %}
<h2>Rotate PDF</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% include "tools/components/uploader.html" with input_name="file" multiple=False %}
    <br><br>
    <select name="angle">
        <option value="90">Rotate 90°</option>
        <option value="180">Rotate 180°</option>
        <option value="270">Rotate 270°</option>
    </select>
    <br><br>
    <button type="submit">Rotate</button>
</form>
{% include "tools/components/uploader_script.html" %}
{% endblock %}
