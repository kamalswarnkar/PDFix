<style>
    .spinner{
        margin:auto;
        margin-top:20px;
        width:40px;
        height:40px;
        border:4px solid #ddd;
        border-top:4px solid #e5322d;
        border-radius:50%;
        animation:spin 1s linear infinite;
    }

    @keyframes spin{
        0%{transform:rotate(0deg);}
        100%{transform:rotate(360deg);}
    }
</style>
