{% extends "tools/base.html" %}

{% block title %}Protect PDF - PDFix{% endblock %}

{% block content %}
<h2>Password Protect PDF</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% include "tools/components/uploader.html" with input_name="file" multiple=False %}
    <br><br>
    <input type="password" name="pwd">
    <br><br>
    <button type="submit">Protect</button>
</form>
{% include "tools/components/uploader_script.html" %}
{% endblock %}
