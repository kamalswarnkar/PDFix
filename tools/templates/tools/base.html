{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}?v=1">
    <title>{% block title %}PDFix{% endblock %}</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }

        .navbar{
            background: #3b82f6;
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .container{
            text-align: center;
            padding: 30px;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="navbar">PDFix</div>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
